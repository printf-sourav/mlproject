<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Predictor</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="{{ url_for('index') }}">Student Performance</a>
            </div>
        </nav>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h3 class="card-title mb-3">Student Exam Performance Prediction</h3>
                            <form action="{{ url_for('predict_datapoint') }}" method="post">
                                <div class="row gy-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Gender</label>
                                        <select class="form-select" name="gender" required>
                                            <option value="" disabled selected>Select Gender</option>
                                            <option value="male">Male</option>
                                            <option value="female">Female</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Race / Ethnicity</label>
                                        <select class="form-select" name="ethnicity" required>
                                            <option value="" disabled selected>Select Ethnicity</option>
                                            <option value="group A">Group A</option>
                                            <option value="group B">Group B</option>
                                            <option value="group C">Group C</option>
                                            <option value="group D">Group D</option>
                                            <option value="group E">Group E</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Parental Education</label>
                                        <select class="form-select" name="parental_level_of_education" required>
                                            <option value="" disabled selected>Select Level</option>
                                            <option value="associate's degree">Associate's degree</option>
                                            <option value="bachelor's degree">Bachelor's degree</option>
                                            <option value="high school">High school</option>
                                            <option value="master's degree">Master's degree</option>
                                            <option value="some college">Some college</option>
                                            <option value="some high school">Some high school</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Lunch</label>
                                        <select class="form-select" name="lunch" required>
                                            <option value="" disabled selected>Select Lunch</option>
                                            <option value="free/reduced">Free/Reduced</option>
                                            <option value="standard">Standard</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Test Preparation</label>
                                        <select class="form-select" name="test_preparation_course" required>
                                            <option value="" disabled selected>Select</option>
                                            <option value="none">None</option>
                                            <option value="completed">Completed</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Reading Score (0-100)</label>
                                        <input class="form-control" type="number" name="reading_score" min="0" max="100" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Writing Score (0-100)</label>
                                        <input class="form-control" type="number" name="writing_score" min="0" max="100" required>
                                    </div>

                                    <div class="col-12 text-end">
                                        <button class="btn btn-primary" type="submit">Predict Maths Score</button>
                                    </div>
                                </div>
                            </form>

                            {% if results is defined %}
                            <div class="mt-4">
                                <h5>Prediction</h5>
                                <div class="alert alert-info fs-4">Estimated Maths Score: <strong>{{ results }}</strong></div>
                            </div>
                            {% endif %}

                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
